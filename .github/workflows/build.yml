name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs when a new push arrives on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            tauri_args: ""
          - os: macos-latest
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            tauri_args: "--target universal-apple-darwin"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # Cache Rust build artifacts to speed up subsequent runs
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # macOS needs autoconf/automake/libtool for mp3lame-sys
      - name: Install macOS build dependencies
        if: matrix.os == 'macos-latest'
        run: brew install autoconf automake libtool

      - run: npm ci

      # Build the Tauri app (produces .exe/.nsis on Windows, .dmg on macOS)
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip code signing — just verifying it compiles
          TAURI_SIGNING_PRIVATE_KEY: ""
          LEMONSQUEEZY_URL: ${{ secrets.LEMONSQUEEZY_URL }}
        with:
          args: ${{ matrix.tauri_args }}

      # Upload installers so testers can download them from the Actions tab
      - name: Upload Windows installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: SetCrate-Windows
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload macOS installer
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: SetCrate-macOS
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
